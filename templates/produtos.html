<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos Disponíveis - SCS Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #e9e9e9; }
        .header-banner { 
            background: #fff; border-bottom: 2px solid var(--mk-color);
            padding: 10px 30px; display: flex; align-items: center;
        }
        .header-banner img { height: 40px; margin-right: 15px; }
        .title-section { background: #f8f8f8; padding: 15px 30px; border-bottom: 1px solid #ddd; }
        
        /* Estilo do Card conforme Protótipo */
        .product-item {
            display: flex; align-items: center;
            background: none; margin-bottom: 30px;
        }
        .img-container {
            width: 120px; height: 120px;
            background: white; border: 2px solid var(--mk-color);
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; overflow: hidden;
            margin-right: 15px;
        }
        .img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .product-info { flex: 1; }
        .product-name { font-size: 1rem; color: #333; margin: 0; font-weight: 500; }
        .product-detail { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h4 class="m-0" style="color: var(--mk-color); font-weight: bold;">SCS Data <span style="font-weight: 300; color: #333;">MARKETING</span></h4>
    </div>

    <div class="title-section">
        <h5 class="m-0">Produtos disponíveis</h5>
    </div>

    <div class="container mt-5">
        <div class="row">
            {% for p in produtos %}
            <div class="col-md-4">
                <div class="product-item">
                    <div class="img-container">
                        <img src="https://www.marykay.com.br/common/images/mk-logo-small.png" alt="Produto">
                    </div>
                    <div class="product-info">
                        <p class="product-name">{{ p.nome }}</p>
                        <p class="product-detail">Qtd: {{ p.estoque_minimo }}</p>
                        <p class="product-detail"><strong>R$ {{ "%.2f"|format(p.preco_venda_sugerido) }}</strong></p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-5">
            <a href="/estoque" class="btn btn-outline-secondary">Voltar ao Menu</a>
        </div>
    </div>

</body>
</html>

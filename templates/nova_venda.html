<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova Venda - SCS Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; }
        .header-banner { background: black; color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--mk-color); }
        .form-venda { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-control, .form-select { border: 2px solid var(--mk-color); border-radius: 10px; }
        .btn-finalizar { background-color: var(--mk-color); color: white; width: 100%; border-radius: 10px; padding: 10px; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div class="header-banner"><h2>MARY KAY</h2></div>
    <div class="container">
        <div class="form-venda">
            <h4 class="mb-4 text-center">Registrar Nova Venda</h4>
            
            <form action="/nova_venda" method="POST">
                
                <div class="mb-3 text-start">
                    <label class="form-label">Produto Vendido</label>
                    <select name="id_produto" class="form-select" required>
                        <option value="">Selecione um produto...</option>
                        {% for p in produtos %}
                        <option value="{{ p.id_produto }}">{{ p.nome }} (Estoque: {{ p.estoque_minimo }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3 text-start">
                        <label class="form-label">Quantidade</label>
                        <input type="number" name="quantidade" class="form-control" value="1" min="1" required>
                    </div>
                    <div class="col-md-6 mb-3 text-start">
                        <label class="form-label">Nome do Cliente</label>
                        <input type="text" name="nome_cliente" class="form-control" placeholder="Cliente" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3 text-start">
                        <label class="form-label">Valor da Venda (R$)</label>
                        <input type="number" step="0.01" id="v_venda" name="valor_venda" class="form-control" value="0.00" oninput="calcularTotal()">
                    </div>
                    <div class="col-md-6 mb-3 text-start">
                        <label class="form-label">Desconto (R$)</label>
                        <input type="number" step="0.01" id="v_desconto" name="desconto" class="form-control" value="0.00" oninput="calcularTotal()">
                    </div>
                </div>

                <div class="mb-3 p-3 bg-light rounded text-center">
                    <h5 class="m-0">Total: R$ <span id="v_total">0.00</span></h5>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Status do Pagamento</label>
                    <select name="status" class="form-select">
                        <option value="Pendente">Pendente</option>
                        <option value="Pago">Pago</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-finalizar mt-3">Confirmar Venda</button>
                <div class="text-center mt-3">
                    <a href="/vendas" class="text-muted text-decoration-none">Voltar</a>
                </div>

            </form>
            </div>
    </div>

    <script>
        function calcularTotal() {
            const venda = parseFloat(document.getElementById('v_venda').value) || 0;
            const desconto = parseFloat(document.getElementById('v_desconto').value) || 0;
            const total = venda - desconto;
            document.getElementById('v_total').innerText = total.toFixed(2);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SCS Data - Alterar Informações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; }
        .header-banner { background: black; color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--mk-color); }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-control { border: 2px solid var(--mk-color); border-radius: 20px; margin-bottom: 15px; }
        .btn-salvar { background-color: var(--mk-color); color: white; width: 100%; border-radius: 20px; padding: 10px; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div class="header-banner"><h2>MARY KAY</h2></div>
    <div class="container">
        <div class="form-container">
            <h4 class="mb-4">Alterar Informações</h4>
            <form action="{{ url_for('atualizar_produto', id=produto.id_produto) }}" method="POST">
                <label>Nome do Produto</label>
                <input type="text" name="nome" class="form-control" value="{{ produto.nome }}" required>
                
                <label>Código MK</label>
                <input type="text" name="codigo_mk" class="form-control" value="{{ produto.codigo_mk }}" required>
                
                <label>Preço de Venda (R$)</label>
                <input type="number" step="0.01" name="preco_venda" class="form-control" value="{{ produto.preco_venda_sugerido }}" required>
                
                <label>Quantidade em Estoque</label>
                <input type="number" name="quantidade" class="form-control" value="{{ produto.estoque_minimo }}" required>
                
                <button type="submit" class="btn btn-salvar mt-3">Salvar Alterações</button>
                <div class="text-center mt-3"><a href="/estoque" class="text-muted">Cancelar</a></div>
            </form>
        </div>
    </div>
</body>
</html>

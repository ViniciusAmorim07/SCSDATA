<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - SCS Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; display: flex; align-items: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: auto; background: white; padding: 30px; border-radius: 15px; border-top: 8px solid black; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-mk { background-color: var(--mk-color); color: white; border: none; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4">SCS DATA</h2>
        <form action="/login" method="POST">
            <input type="email" name="email" class="form-control mb-3" placeholder="E-mail" required>
            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" required>
            <button type="submit" class="btn btn-mk w-100 mb-3">Entrar</button>
            <a href="/cadastro" class="text-muted">Não tem conta? Cadastre-se</a>
        </form>
    </div>
</body>
</html>

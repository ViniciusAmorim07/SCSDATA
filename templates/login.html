<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCS Data - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-login { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card card-login shadow p-4 bg-white rounded">
            <h3 class="text-center mb-4">Acessar Sistema</h3>
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Entrar</button>
            </form>
            
            <p class="text-center mt-3">Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- O título muda dinamicamente -->
    <title>SCS Data - {% block title %}Sistema{% endblock %}</title>
    
    <!-- CSS do Bootstrap e Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; }
        
        /* Menu Superior */
        .navbar-custom { background-color: #212529; }
        .navbar-custom .navbar-brand { color: #ffffff; font-weight: bold; letter-spacing: 1px; }
        .navbar-custom .nav-link { color: rgba(255, 255, 255, 0.75); }
        .navbar-custom .nav-link:hover { color: #ffffff; font-weight: bold; }
        .navbar-toggler { border-color: rgba(255,255,255,0.5); }
        .navbar-toggler-icon { filter: invert(1); }
    </style>
</head>
<body>

    <!-- MENU SUPERIOR RESPONSIVO (Fixo para todas as páginas) -->
    <nav class="navbar navbar-expand-lg navbar-custom mb-4 shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">SCS DATA</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/estoque">Estoque</a></li>
                    <li class="nav-item"><a class="nav-link" href="/vendas">Vendas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/compras">Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="/historico_compras">Histórico de Compras</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right"></i> Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- O "BURACO" MÁGICO: É aqui que o conteúdo de cada tela vai entrar! -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCS Data - Cadastro</title>
    <title>Cadastro - SCS Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-cadastro { max-width: 400px; margin-top: 100px; }
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; display: flex; align-items: center; height: 100vh; }
        .card-cadastro { max-width: 450px; width: 100%; margin: auto; background: white; padding: 30px; border-radius: 15px; border-top: 8px solid var(--mk-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-mk { background-color: black; color: white; border: none; font-weight: bold; }
        .btn-mk:hover { background-color: #333; color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card card-cadastro shadow p-4 bg-white rounded">
            <h3 class="text-center mb-4">Criar Conta</h3>
            <form action="/cadastro" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            </form>
            <p class="text-center mt-3">Já tem conta? <a href="/login">Entre aqui</a></p>
        </div>
    <div class="card-cadastro text-center">
        <h3 class="mb-4">Criar Conta SCS DATA</h3>
        <form action="/cadastro" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">Nome Completo</label>
                <input type="text" name="nome" class="form-control" placeholder="Seu nome" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="exemplo@mail.com" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Crie uma senha forte" required>
            </div>
            <button type="submit" class="btn btn-mk w-100 mb-3">Finalizar Cadastro</button>
            <p>Já tem conta? <a href="/login" style="color: var(--mk-color);">Fazer Login</a></p>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCS Data - Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mk-color: #b36b6b; }
        body { background-color: #f4f4f4; }
        .header-banner { 
            background: black; color: white; padding: 20px; 
            text-align: center; border-bottom: 5px solid var(--mk-color);
        }
        .form-container {
            max-width: 800px; margin: 50px auto;
            background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-control {
            border: 2px solid var(--mk-color); border-radius: 20px; padding: 10px 20px;
        }
        .btn-concluir {
            background-color: var(--mk-color); color: white; border: none;
            padding: 12px 60px; border-radius: 10px; font-size: 1.2em; transition: 0.3s;
        }
        .btn-concluir:hover { background-color: #8c5252; transform: scale(1.05); }
        h4 { color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h2>MARY KAY <span style="font-weight: 300; font-size: 0.8em;">.jtg</span></h2>
    </div>

    <div class="container">
        <div class="form-container text-center">
            <h4 class="text-start">Seja bem vinda!</h4>
            <p class="mb-5">Cadastrar novos produtos.</p>

            <form action="/cadastrar_produto" method="POST">
                <div class="row g-4">
                    <div class="col-md-4">
                        <input type="text" name="nome" class="form-control" placeholder="Nome" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="codigo_mk" class="form-control" placeholder="ID (Código MK)" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="categoria" class="form-control" placeholder="Categoria">
                    </div>
                    <div class="col-md-4">
                        <input type="number" step="0.01" name="preco_venda" class="form-control" placeholder="Valor de venda" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" step="0.01" name="custo" class="form-control" placeholder="Valor da mercadoria" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" name="quantidade" class="form-control" placeholder="Quantidade" required>
                    </div>
                </div>

                <div class="mt-5">
                    <button type="submit" class="btn btn-concluir">Concluir</button>
                </div>
                <div class="mt-3">
                    <a href="/estoque" class="text-muted text-decoration-none">Voltar ao estoque</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
